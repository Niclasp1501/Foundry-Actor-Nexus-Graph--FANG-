<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="portraitBg" cx="50%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#dcd5c8"/>
      <stop offset="100%" stop-color="#948874"/>
    </radialGradient>
    <linearGradient id="cloak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a4654"/>
      <stop offset="100%" stop-color="#23202b"/>
    </linearGradient>
    <radialGradient id="head" cx="50%" cy="42%" r="66%">
      <stop offset="0%" stop-color="#d8c7ab"/>
      <stop offset="100%" stop-color="#b39a78"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9be67"/>
      <stop offset="100%" stop-color="#9b7a2f"/>
    </linearGradient>
    <clipPath id="portraitClip">
      <circle cx="256" cy="256" r="198"/>
    </clipPath>
  </defs>

  <!-- Transparent outside; only a round token remains -->
  <g clip-path="url(#portraitClip)">
    <circle cx="256" cy="256" r="205" fill="url(#portraitBg)"/>
    <circle cx="256" cy="256" r="198" fill="#1d1a21" opacity="0.14"/>

    <!-- neutral, anonymous bust -->
    <path d="M122 430c14-104 68-166 134-188 66 22 120 84 134 188z" fill="url(#cloak)"/>
    <path d="M164 250c16-58 50-98 92-112 42 14 76 54 92 112-24-20-54-34-92-34s-68 14-92 34z" fill="#353043"/>
    <circle cx="256" cy="228" r="46" fill="url(#head)"/>
    <ellipse cx="256" cy="220" rx="42" ry="30" fill="#e5d7bf" opacity="0.42"/>
    <path d="M224 268c20 10 44 10 64 0" fill="none" stroke="#6c5745" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

    <ellipse cx="256" cy="442" rx="114" ry="20" fill="#16131a" opacity="0.18"/>
  </g>

  <!-- Round token border -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#1a171f" stroke-width="16"/>
  <circle cx="256" cy="256" r="223" fill="none" stroke="url(#ring)" stroke-width="8"/>
  <circle cx="256" cy="256" r="210" fill="none" stroke="#2a252f" stroke-width="6" opacity="0.9"/>
</svg>
